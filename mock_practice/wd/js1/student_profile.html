<!DOCTYPE html>
<html>

<head>
    <title>Student Profile Form</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
        }

        .container {
            width: 450px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
        }

        .error {
            color: red;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: blue;
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }
    </style>

    <script>

        function validateForm() {

            document.getElementById("nameError").innerHTML = "";
            document.getElementById("emailError").innerHTML = "";
            document.getElementById("ageError").innerHTML = "";
            document.getElementById("rollError").innerHTML = "";
            document.getElementById("fileError").innerHTML = "";

            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let age = document.getElementById("age").value;
            let roll = document.getElementById("roll").value;
            let photo = document.getElementById("photo").value;

            let valid = true;

            if (name == "") {
                document.getElementById("nameError").innerHTML = "Name Required";
                valid = false;
            }

            let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

            if (!email.match(emailPattern)) {
                document.getElementById("emailError").innerHTML = "Invalid Email";
                valid = false;
            }

            if (age < 18 || age > 30) {
                document.getElementById("ageError").innerHTML = "Age must be between 18-30";
                valid = false;
            }

            let rollPattern = /^[A-Z]{2}[0-9]{3}$/;

            if (!roll.match(rollPattern)) {
                document.getElementById("rollError").innerHTML =
                    "Format Example: CS101";
                valid = false;
            }

            if (photo != "") {
                let ext = photo.split('.').pop().toLowerCase();

                if (ext != "jpg" && ext != "png" && ext != "jpeg") {
                    document.getElementById("fileError").innerHTML =
                        "Only jpg png jpeg allowed";
                    valid = false;
                }
            }
            else {
                document.getElementById("fileError").innerHTML =
                    "Upload Photo";
                valid = false;
            }

            if (valid) {

                let btn = document.getElementById("submitBtn");

                btn.innerHTML = "Submitted Successfully";
                btn.style.background = "green";

                alert("Form Submitted Successfully");

            }

            return false;

        }

    </script>

</head>

<body>

    <div class="container">

        <h2>Student Profile Form</h2>

        <form onsubmit="return validateForm()">

            <label>Name</label>
            <input type="text" id="name">
            <div class="error" id="nameError"></div>

            <label>Email</label>
            <input type="text" id="email">
            <div class="error" id="emailError"></div>

            <label>Age</label>
            <input type="number" id="age">
            <div class="error" id="ageError"></div>

            <label>Roll Number</label>
            <input type="text" id="roll">
            <div class="error" id="rollError"></div>

            <label>Profile Photo</label>
            <input type="file" id="photo">
            <div class="error" id="fileError"></div>

            <button id="submitBtn">
                Submit
            </button>

        </form>

    </div>

</body>

</html>
